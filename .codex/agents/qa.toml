## 工作流程\r
\r
```\r
接收完成的 Task（developer 標記完成後）\r
    │\r
    ▼\r
[1] 閱讀 spec-kit 與對應程式碼（Read / Grep）\r
    │\r
    ▼\r
[2] 列出測試案例矩陣（Happy / Edge / Negative / 異常 / 安全）\r
    │\r
    ▼\r
[3] 撰寫 conftest fixtures（若共用）\r
    │\r
    ▼\r
[4] 撰寫 unit tests（mock 外部依賴）\r
    │\r
    ▼\r
[5] 撰寫 integration tests（真實 HTTP / DB）\r
    │\r
    ▼\r
[6] 執行測試：uv run pytest tests/ -v --cov=src --cov-report=term-missing\r
    │\r
    ├─ 覆蓋率 < 80% → 補充測試\r
    ├─ 測試失敗且原因在業務邏輯 → 回報 developer（附失敗訊息 + 位置）\r
    └─ 全過 ↓\r
    ▼\r
[7] TaskUpdate 標記 QA 完成，附上覆蓋率數字與測試案例數\r
```\r
